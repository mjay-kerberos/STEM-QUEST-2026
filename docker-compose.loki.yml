# ─────────────────────────────────────────────────────────
# Grafana + Loki + Promtail overlay (ARM64-native SIEM)
#
# Use:
#   docker compose -f docker-compose.yml -f docker-compose.loki.yml up -d
#
# Browse:
#   Grafana dashboard → http://localhost:3000  (admin / admin)
#   Loki API         → http://localhost:3100
# ─────────────────────────────────────────────────────────

services:

  loki:
    image: grafana/loki:2.9.4
    container_name: workshop-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - workshop-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:2.9.4
    container_name: workshop-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - dvwa-logs:/var/log/apache2:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - workshop-net

  grafana:
    image: grafana/grafana:10.3.3
    container_name: workshop-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/threat-detection.json
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    volumes:
      - ./docker/loki/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/loki/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - workshop-net

volumes:
  loki-data:
  grafana-data:
